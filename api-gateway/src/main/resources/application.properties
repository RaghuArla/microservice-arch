spring.application.name=api-gateway
server.port=9191

spring.cloud.gateway.server.webflux.routes[0].id=product-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081/
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/product-service/**
 

spring.cloud.gateway.server.webflux.routes[1].id=mstwo
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082/
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/mstwo/**




resilience4j.circuitbreaker.instances.Product-Service-1.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.Product-Service-1.slidingWindowSize=6
resilience4j.circuitbreaker.instances.Product-Service-1.failureRateThreshold=50
resilience4j.circuitbreaker.instances.Product-Service-1.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.Product-Service-1.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.Product-Service-1.minimumNumberOfCalls=5